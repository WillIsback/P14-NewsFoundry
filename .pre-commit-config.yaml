minimum_pre_commit_version: "3.7.0"

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-format
        files: ^backend/.*\.py$
      - id: ruff
        args: [--fix]
        files: ^backend/.*\.py$

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
      - id: bandit
        name: bandit (backend security scan)
        args: ["-r", "backend/src", "-x", "backend/tests", "-s", "B106"]
        pass_filenames: false