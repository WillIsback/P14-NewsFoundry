name: Feature Request
description: Propose a new feature or improvement.
title: "[feat] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template to propose a new feature or an improvement to an existing one.

  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What is the current limitation or pain point?
      placeholder: "As a user, I cannot do X, which means I have to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to see implemented.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about?
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How do we know this feature is done?
      placeholder: |
        - [ ] User can do X
        - [ ] API returns Y
        - [ ] Tests cover Z
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Backend
        - Frontend
        - Infrastructure / DevOps
        - Documentation
        - Other
    validations:
      required: true
