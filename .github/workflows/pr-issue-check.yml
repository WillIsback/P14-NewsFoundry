name: PR Issue Validation

on:
  pull_request:
    branches:
      - main

permissions:
  pull-requests: read

jobs:
  validate-pr:
    name: Validate PR Links Issue
    runs-on: ubuntu-latest
    steps:
      - name: Check PR body references an issue
        env:
          PR_BODY: "${{ github.event.pull_request.body }}"
        run: |
          if echo "$PR_BODY" | grep -qiE '(closes|fixes|resolves)[[:space:]]+#[0-9]+'; then
            echo "✅ PR references an issue. Ready for review."
          else
            echo "❌ This PR must solve a GitHub issue."
            echo ""
            echo "   Add one of the following lines in the PR description:"
            echo "     Closes #<number>"
            echo "     Fixes #<number>"
            echo "     Resolves #<number>"
            echo ""
            echo "   The pr-autolink-issue workflow injects this automatically when the PR is opened."
            echo "   If it failed, check that the branch name contains an issue number."
            exit 1
          fi
