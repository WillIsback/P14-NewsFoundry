name: PR Issue Validation

on:
  pull_request:
    branches:
      - main

permissions:
  pull-requests: read

jobs:
  validate-pr:
    name: Validate PR Links Issue
    runs-on: ubuntu-latest
    steps:
      - name: Check branch naming convention
        id: branch-check
        run: |
          BRANCH="${{ github.head_ref }}"
          # Accept: feat/42-my-feature  fix/42-bug  chore/42-...  docs/42-...  refactor/42-...  test/42-...
          if echo "$BRANCH" | grep -qE '^(feat|fix|chore|docs|refactor|test)/[0-9]+-[a-z0-9-]+$'; then
            echo "branch_ok=true" >> "$GITHUB_OUTPUT"
            echo "✅ Branch '$BRANCH' follows the naming convention."
          else
            echo "branch_ok=false" >> "$GITHUB_OUTPUT"
            echo "❌ Branch '$BRANCH' does not follow the naming convention."
            echo "   Expected format: <type>/<issue-number>-<short-description>"
            echo "   Examples : feat/42-add-login   fix/7-null-pointer   chore/12-update-deps"
            echo "   Allowed types: feat | fix | chore | docs | refactor | test"
          fi

      - name: Check PR body references an issue
        id: issue-check
        env:
          PR_BODY: "${{ github.event.pull_request.body }}"
        run: |
          if echo "$PR_BODY" | grep -qiE '(closes|fixes|resolves)[[:space:]]+#[0-9]+'; then
            echo "issue_ok=true" >> "$GITHUB_OUTPUT"
            echo "✅ PR body contains a valid issue reference."
          else
            echo "issue_ok=false" >> "$GITHUB_OUTPUT"
            echo "❌ PR body must reference an issue."
            echo "   Add one of the following lines in the PR description:"
            echo "     Closes #42"
            echo "     Fixes #42"
            echo "     Resolves #42"
          fi

      - name: Fail if any check did not pass
        run: |
          BRANCH_OK="${{ steps.branch-check.outputs.branch_ok }}"
          ISSUE_OK="${{ steps.issue-check.outputs.issue_ok }}"

          if [ "$BRANCH_OK" != "true" ] || [ "$ISSUE_OK" != "true" ]; then
            echo ""
            echo "============================================"
            echo " PR Validation Failed — fix the issues below"
            echo "============================================"
            if [ "$BRANCH_OK" != "true" ]; then
              echo " [branch] Must follow: (feat|fix|chore|docs|refactor|test)/<issue-number>-<description>"
            fi
            if [ "$ISSUE_OK" != "true" ]; then
              echo " [issue]  PR body must contain: Closes #<number>, Fixes #<number>, or Resolves #<number>"
            fi
            exit 1
          fi

          echo "✅ All PR validations passed. Ready for review."
