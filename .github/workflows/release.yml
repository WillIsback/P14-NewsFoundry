---
name: Release

# Deux modes détectés automatiquement via le message du commit déclencheur :
#
# Mode BUMP (commit applicatif) :
#   → crée une issue + branche + PR de montée de version avec auto-merge activé
#   → le label [backend] ou [frontend] dans le commit préserve le type de trigger
#
# Mode PUBLISH (commit "chore: bump version…" détecté) :
#   → crée le tag git, la GitHub Release, et l'image Docker (si [backend])
#
# workflow_dispatch → PUBLISH sur la version courante (premier déploiement manuel)
on:
  workflow_run:
    workflows: ["Backend Tests", "Frontend Tests"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  # Un seul run par SHA : si Backend Tests et Frontend Tests terminent tous les deux
  # pour le même commit, le second déclenchement attend que le premier finisse ;
  # l'idempotence est assurée par la vérification de branche dans create-bump-pr.
  group: release-pipeline-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

permissions:
  contents: write    # push branche + tag + release
  packages: write    # push ghcr.io
  pull-requests: write  # créer PR + activer auto-merge
  issues: write      # créer issue de release

jobs:
  # ── Détection du mode ──────────────────────────────────────────────────────
  detect:
    name: Detect release mode
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      mode: ${{ steps.detect.outputs.mode }}            # 'bump' | 'publish'
      with_docker: ${{ steps.detect.outputs.with_docker }}  # 'true' | 'false'
    steps:
      - name: Detect trigger type
        id: detect
        run: |
          TRIGGER="${{ github.event_name }}"
          MSG="${{ github.event.workflow_run.head_commit.message }}"
          WF="${{ github.event.workflow_run.name }}"

          if [ "$TRIGGER" = "workflow_dispatch" ]; then
            # Manuel : publier l'état courant sans bump de version
            echo "mode=publish" >> "$GITHUB_OUTPUT"
            echo "with_docker=true" >> "$GITHUB_OUTPUT"
          elif echo "$MSG" | grep -qE '^chore: bump version to v[0-9]'; then
            # Commit de bump détecté → tag + release (+ Docker si [backend])
            echo "mode=publish" >> "$GITHUB_OUTPUT"
            if echo "$MSG" | grep -q "\[backend\]"; then
              echo "with_docker=true" >> "$GITHUB_OUTPUT"
            else
              echo "with_docker=false" >> "$GITHUB_OUTPUT"
            fi
          else
            # Commit applicatif → créer la PR de bump
            echo "mode=bump" >> "$GITHUB_OUTPUT"
            if [ "$WF" = "Backend Tests" ]; then
              echo "with_docker=true" >> "$GITHUB_OUTPUT"
            else
              echo "with_docker=false" >> "$GITHUB_OUTPUT"
            fi
          fi

  # ── Mode BUMP : créer la PR de montée de version ──────────────────────────
  create-bump-pr:
    name: Create version bump PR
    needs: detect
    if: ${{ needs.detect.outputs.mode == 'bump' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: main
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute new version
        run: |
          CURRENT=$(python3 -c "
          import re, sys
          content = open('backend/pyproject.toml').read()
          m = re.search(r'^version\s*=\s*\"([^\"]+)\"', content, re.MULTILINE)
          print(m.group(1) if m else sys.exit(1))
          ")
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          # ── Détection du type de bump via le message du commit déclencheur ──
          COMMIT_MSG="${{ github.event.workflow_run.head_commit.message }}"

          if echo "$COMMIT_MSG" | grep -qE '^(feat|fix|refactor|docs|test|chore|style|perf|build|ci)!:|BREAKING CHANGE'; then
            BUMP_TYPE="major"
          elif echo "$COMMIT_MSG" | grep -qE '^feat(\(.*\))?:'; then
            BUMP_TYPE="minor"
          else
            # fix, perf, refactor, docs, test, chore, style → patch
            BUMP_TYPE="patch"
          fi

          # ── Calcul de la nouvelle version ───────────────────────────────────
          case "$BUMP_TYPE" in
            major)
              NEW_VERSION="$((MAJOR + 1)).0.0"
              ;;
            minor)
              # Cap minor à 40 : au-delà on passe au major
              if [ "$MINOR" -ge 40 ]; then
                NEW_VERSION="$((MAJOR + 1)).0.0"
              else
                NEW_VERSION="${MAJOR}.$((MINOR + 1)).0"
              fi
              ;;
            patch)
              NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
              ;;
          esac

          echo "Bump type    : $BUMP_TYPE"
          echo "Version bump : $CURRENT → $NEW_VERSION"
          # NEW_VERSION (sans v) pour les fichiers ; le job publish préfixe avec v
          echo "NEW_VERSION=${NEW_VERSION}" >> "$GITHUB_ENV"
          echo "BUMP_TYPE=${BUMP_TYPE}" >> "$GITHUB_ENV"
          # Encode le type de trigger dans le label — lu par le job publish pour Docker
          if [ "${{ needs.detect.outputs.with_docker }}" = "true" ]; then
            echo "TRIGGER_LABEL=backend" >> "$GITHUB_ENV"
          else
            echo "TRIGGER_LABEL=frontend" >> "$GITHUB_ENV"
          fi

      - name: Guard — skip if bump branch already exists
        id: guard
        run: |
          # Idempotence : si le second déclenchement (Backend/Frontend Tests) arrive
          # après que le premier a déjà créé la branche, les étapes suivantes sont sautées.
          if git ls-remote origin | grep -q "refs/heads/chore/.*-release-v${NEW_VERSION}$"; then
            echo "⚠️  Branche de bump v${NEW_VERSION} déjà présente — déclenchement ignoré."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "✅ Aucune branche de bump existante — on continue."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release issue
        if: steps.guard.outputs.skip != 'true'
        run: |
          ISSUE_URL=$(gh issue create \
            --title "chore: release v${NEW_VERSION}" \
            --body "Montée de version automatique vers \`v${NEW_VERSION}\` déclenchée par un merge sur \`main\`.")
          ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
          echo "ISSUE_NUMBER=${ISSUE_NUMBER}" >> "$GITHUB_ENV"
          echo "✅ Issue #${ISSUE_NUMBER} créée"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create branch and update version files
        if: steps.guard.outputs.skip != 'true'
        run: |
          BRANCH="chore/${ISSUE_NUMBER}-release-v${NEW_VERSION}"
          git checkout -b "$BRANCH"

          # Mise à jour backend/pyproject.toml via Python (robuste au format TOML)
          python3 -c "
          import re, os
          path = 'backend/pyproject.toml'
          content = open(path).read()
          new_ver = os.environ['NEW_VERSION']
          content = re.sub(
              r'^(version\s*=\s*)\"[^\"]+\"',
              lambda m: m.group(1) + '\"' + new_ver + '\"',
              content, flags=re.MULTILINE
          )
          open(path, 'w').write(content)
          "

          # Mise à jour frontend/package.json via jq
          jq --arg v "$NEW_VERSION" '.version = $v' frontend/package.json > tmp.json \
            && mv tmp.json frontend/package.json

          # [backend] ou [frontend] dans le message → préserve le type pour le job publish
          git add backend/pyproject.toml frontend/package.json
          git commit -m "chore: bump version to v${NEW_VERSION} [${TRIGGER_LABEL}] (${BUMP_TYPE})"
          git push origin "$BRANCH"

      - name: Create PR
        # RELEASE_PAT requis : GITHUB_TOKEN est bloqué par le paramètre repo
        # "GitHub Actions is not permitted to create pull requests".
        if: steps.guard.outputs.skip != 'true'
        run: |
          PR_URL=$(gh pr create \
            --title "chore: bump version to v${NEW_VERSION} [${TRIGGER_LABEL}] (${BUMP_TYPE})" \
            --body "Montée de version automatique vers \`v${NEW_VERSION}\` (\`${BUMP_TYPE}\` bump).

          Closes #${ISSUE_NUMBER}")
          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          echo "PR_NUMBER=${PR_NUMBER}" >> "$GITHUB_ENV"
          echo "✅ PR #${PR_NUMBER} créée"
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}

      - name: Enable auto-merge
        # RELEASE_PAT requis pour activer l'auto-merge sur une branche protégée.
        if: steps.guard.outputs.skip != 'true'
        run: |
          gh pr merge "$PR_NUMBER" --auto --squash
          echo "✅ Auto-merge activé sur PR #${PR_NUMBER} (attente des checks)"
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}

  # ── Mode PUBLISH : créer le tag et la GitHub Release ──────────────────────
  publish:
    name: Create tag & GitHub Release
    needs: detect
    if: ${{ needs.detect.outputs.mode == 'publish' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
    steps:
      - name: Checkout main
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: main
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Read current version
        id: version
        run: |
          VERSION=$(python3 -c "
          import re, sys
          content = open('backend/pyproject.toml').read()
          m = re.search(r'^version\s*=\s*\"([^\"]+)\"', content, re.MULTILINE)
          print(m.group(1) if m else sys.exit(1))
          ")
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "new_version=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q "v${VERSION}"; then
            echo "⚠️ Tag v${VERSION} existe déjà — étape ignorée"
          else
            git tag "v${VERSION}"
            git push origin "v${VERSION}"
            echo "✅ Tag v${VERSION} créé et poussé"
          fi

      - name: Create GitHub Release
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        env:
          TAG_NAME: ${{ steps.version.outputs.new_version }}
        with:
          script: |
            try {
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: process.env.TAG_NAME,
                name: `Release ${process.env.TAG_NAME}`,
                generate_release_notes: true,
              });
              console.log(`✅ Release ${process.env.TAG_NAME} créée`);
            } catch (e) {
              if (e.status === 422) {
                console.log(`⚠️ Release ${process.env.TAG_NAME} existe déjà — ignorée`);
              } else {
                throw e;
              }
            }

  # ── Docker build + push (uniquement si déclencheur backend) ───────────────
  docker-publish:
    name: Build & push Docker image
    needs: [detect, publish]
    if: ${{ needs.detect.outputs.with_docker == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout at release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: ${{ needs.publish.outputs.new_version }}

      - name: Set lowercase registry owner
        # ghcr.io exige des noms en minuscules — GITHUB_REPOSITORY_OWNER peut contenir des majuscules
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/newsfoundry-backend:${{ needs.publish.outputs.new_version }}
            ghcr.io/${{ env.OWNER }}/newsfoundry-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
