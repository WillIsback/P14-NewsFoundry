name: PR Auto-link Issue

on:
  pull_request:
    branches:
      - main
    types:
      - opened

permissions:
  pull-requests: write

jobs:
  autolink:
    name: Inject issue reference into PR body
    runs-on: ubuntu-latest
    steps:
      - name: Extract issue number and patch PR body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BODY: ${{ github.event.pull_request.body }}
          BRANCH: ${{ github.head_ref }}
          REPO: ${{ github.repository }}
        run: |
          # Extract issue number from branch name
          # Supports any format that contains a number, e.g.:
          #   feat/42-desc      → 42
          #   42-feat-desc      → 42
          #   18-bug-desc       → 18
          #   fix/7-desc        → 7
          ISSUE_NUMBER=$(echo "$BRANCH" | grep -oE '[0-9]+' | head -1)

          if [ -z "$ISSUE_NUMBER" ]; then
            echo "⚠️  Could not extract issue number from branch '$BRANCH'. Skipping."
            exit 0
          fi

          echo "Detected issue number: #$ISSUE_NUMBER"

          # Check if PR body already references the issue
          if echo "$PR_BODY" | grep -qiE "(closes|fixes|resolves)[[:space:]]+#${ISSUE_NUMBER}"; then
            echo "✅ PR body already references #$ISSUE_NUMBER. Nothing to do."
            exit 0
          fi

          # Append the closing reference to the PR body
          NEW_BODY=$(printf '%s\n\nCloses #%s\n' "$PR_BODY" "$ISSUE_NUMBER")
          gh pr edit "$PR_NUMBER" --body "$NEW_BODY" --repo "$REPO"
          echo "✅ Injected 'Closes #${ISSUE_NUMBER}' into PR body."
