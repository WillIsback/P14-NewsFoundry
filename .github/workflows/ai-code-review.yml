name: AI Code Review on PR

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/**"

permissions:
  pull-requests: write
  contents: read

jobs:
  ai-review-skipped:
    name: AI Review Guardrails
    runs-on: ubuntu-latest
    if: >-
      ${{
        !contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association)
        && !contains(github.event.pull_request.labels.*.name, 'safe-to-test')
      }}
    steps:
      - name: Explain why AI review is skipped
        run: |
          echo "AI review skipped by policy."
          echo "Allowed automatically for internal contributors (OWNER/MEMBER/COLLABORATOR)."
          echo "For external PRs/forks, a maintainer must add the 'safe-to-test' label to run manually."

  ai-review:
    name: AI Code Review
    runs-on: self-hosted
    timeout-minutes: 10
    if: >-
      ${{
        contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association)
        || contains(github.event.pull_request.labels.*.name, 'safe-to-test')
      }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: AI Code Review
        uses: WillIsback/code-review@5cee9703d96586b08ece272d6753d612f712ede5 # v0.4.0
        with:
          vllm-url: ${{ secrets.VLLM_URL }}
          vllm-api-key: ${{ secrets.VLLM_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vllm-model: ${{ vars.VLLM_MODEL || '' }}
          vllm-timeout: ${{ vars.VLLM_TIMEOUT || '120' }}
          vllm-retries: ${{ vars.VLLM_RETRIES || '2' }}
